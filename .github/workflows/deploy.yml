name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build site (Jinja2 templates → HTML)
        # ML steps (posts.json / graph.json / tags.json) are regenerated locally
        # by the author and committed; CI only renders templates.
        run: |
          cd scripts
          uv run --with jinja2 python build_site.py

      - name: Install JupyterLite
        run: pip install jupyterlite-core jupyterlite-pyodide-kernel jupyter-server

      - name: Collect notebooks for JupyterLite
        run: |
          mkdir -p _jl_contents
          for ipynb in posts/*/content.ipynb; do
            [ -f "$ipynb" ] || continue
            slug=$(basename $(dirname "$ipynb"))
            mkdir -p "_jl_contents/posts/$slug"
            cp "$ipynb" "_jl_contents/posts/$slug/content.ipynb"
          done

      - name: Build JupyterLite
        run: jupyter lite build --contents _jl_contents --output-dir lab --base-url /pages/lab/

      - name: Prepare site
        run: |
          mkdir -p _site
          # Built HTML + static assets. JS modules live under src/.
          for item in index.html style.css src about blog twinkle github posts \
                      projects.json github-sources.json .nojekyll; do
            [ -e "$item" ] && cp -r "$item" _site/ || true
          done
          # JupyterLite 출력
          cp -r lab _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
