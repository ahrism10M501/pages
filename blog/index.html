<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Ahrism</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body data-page="1">
  <aside id="sidebar">
    <div class="sidebar-icons">
      <button class="sidebar-btn" data-label="Home" data-href="../">⌂</button>
      <button class="sidebar-btn" data-panel="about" data-label="About">◉</button>
      <button class="sidebar-btn active" data-label="Blog" data-href="./">≡</button>
      <button class="sidebar-btn" data-label="GitHub" data-href="../github/">⬡</button>
    </div>
    <div id="panel-about" class="sidebar-panel">
      <div class="label">About</div>
      <p class="panel-placeholder">준비 중</p>
    </div>
  </aside>
  <div id="page-content">
  <main class="container">
    <!-- 1. 검색바 최상단 -->
    <div class="search-bar" style="margin-top:1rem">
      <input type="text" id="search-input" placeholder="검색...">
      <label class="toggle-label" id="tfidf-label" style="display:none">
        <input type="checkbox" id="tfidf-toggle">
        키워드 가중
      </label>
    </div>

    <!-- 2. 태그 필터 + 뷰 토글 -->
    <div style="display:flex;align-items:flex-start;gap:0.5rem;margin-bottom:1rem">
      <div class="tag-filters" id="tag-filters" style="flex:1;margin-bottom:0"></div>
      <div class="view-toggle" style="margin-bottom:0;flex-shrink:0;margin-top:0.15rem">
        <button id="btn-graph" title="그래프 뷰">G</button>
        <button id="btn-list" class="active" title="리스트 뷰">☰</button>
      </div>
    </div>

    <!-- 3. 그래프 뷰 -->
    <div id="graph-view" style="display:none">
      <div class="graph-container" id="graph-container"></div>
    </div>

    <!-- 4. 리스트 뷰 -->
    <div id="list-view">
      <div id="posts-container"></div>
    </div>
  </main>
  <footer class="container" style="margin-top: 3rem; padding-bottom: 2rem;">
    <div style="color: var(--pico-muted-color); font-size: 0.75rem; margin-bottom: 0.5rem;">
      Built with PicoCSS & Cytoscape.js
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-top: 1px solid var(--pico-muted-border-color); padding-top: 1.5rem;">

      <div style="flex: 1; min-width: 120px;">
        <small>&copy; 2026 ahrism</small>
      </div>

      <div style="flex: 1; text-align: center; min-width: 100px;">
        <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;" class="secondary" style="text-decoration: none; font-size: 0.85rem; font-weight: bold;">
          ↑ Top
        </a>
      </div>

      <div style="flex: 1; display: flex; gap: 1.5rem; justify-content: flex-end; font-size: 0.85rem; min-width: 200px;">
        <a href="https://github.com/ahrism10M501" target="_blank" rel="noopener noreferrer" class="secondary">GitHub</a>
        <a href="https://www.youtube.com/@ahrism-3475" target="_blank" rel="noopener noreferrer" class="secondary">YouTube</a>
        <a href="mailto:l.all.means@gmail.com" class="secondary">Contact</a>
      </div>

    </div>
  </footer>
  </div><!-- /#page-content -->

  <script src="../app.js"></script>
  <script src="../graph.js"></script>
  <script>
    // Cytoscape 스크립트를 그래프 뷰 진입 시 동적 로드 (초기 로딩 속도 개선)
    function loadCytoscapeScripts() {
      if (window._cytoscapeLoaded) return Promise.resolve();
      if (window._cytoscapeLoading) return window._cytoscapeLoading;
      var srcs = [
        'https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js',
        'https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js',
        'https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js',
        'https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js',
      ];
      window._cytoscapeLoading = srcs.reduce(function (chain, src) {
        return chain.then(function () {
          return new Promise(function (resolve, reject) {
            var s = document.createElement('script');
            s.src = src; s.onload = resolve; s.onerror = reject;
            document.head.appendChild(s);
          });
        });
      }, Promise.resolve()).then(function () { window._cytoscapeLoaded = true; });
      return window._cytoscapeLoading;
    }

    (async () => {
      // --- 데이터 로드 ---
      const graphData = await fetchGraph('./graph.json');
      const posts = await fetchPosts('./posts.json');
      const nodes = graphData ? graphData.nodes : posts.map(p => ({
        id: p.slug, title: p.title, date: p.date, tags: p.tags, summary: p.summary, tfidf: {}
      }));
      const hasGraph = graphData && graphData.nodes.length > 1;

      // --- 태그 필터 렌더링 (전체 칩 포함) ---
      const allTags = [...new Set(nodes.flatMap(n => n.tags || []))].sort();
      const tagContainer = document.getElementById('tag-filters');

      // "전체" 칩
      const allChip = document.createElement('span');
      allChip.className = 'tag--filter active';
      allChip.textContent = '전체';
      allChip.dataset.all = '1';
      allChip.addEventListener('click', () => {
        document.querySelectorAll('.tag--filter:not([data-all])').forEach(c => c.classList.remove('active'));
        allChip.classList.add('active');
        applyFilters();
      });
      tagContainer.appendChild(allChip);

      allTags.forEach(tag => {
        const chip = document.createElement('span');
        chip.className = 'tag--filter';
        chip.textContent = tag;
        chip.addEventListener('click', () => {
          allChip.classList.remove('active');
          chip.classList.toggle('active');
          const anyActive = [...document.querySelectorAll('.tag--filter:not([data-all]).active')].length > 0;
          if (!anyActive) allChip.classList.add('active');
          applyFilters();
        });
        tagContainer.appendChild(chip);
      });

      // --- 뷰 토글 ---
      const btnGraph = document.getElementById('btn-graph');
      const btnList = document.getElementById('btn-list');
      const graphView = document.getElementById('graph-view');
      const listView = document.getElementById('list-view');
      let currentView = 'list';
      let cy = null;

      function setView(view) {
        currentView = view;
        if (view === 'graph') {
          graphView.style.display = '';
          listView.style.display = 'none';
          btnGraph.classList.add('active');
          btnList.classList.remove('active');
          if (!cy && hasGraph) initMainGraph();
        } else {
          graphView.style.display = 'none';
          listView.style.display = '';
          btnList.classList.add('active');
          btnGraph.classList.remove('active');
        }
        applyFilters();
      }

      btnGraph.addEventListener('click', () => {
        // Cytoscape 동적 로드 후 그래프 뷰 전환
        loadCytoscapeScripts().then(() => setView('graph'));
      });
      btnList.addEventListener('click', () => setView('list'));

      // 그래프 데이터가 없거나 노드 0~1개면 리스트로 폴백
      if (!hasGraph) {
        btnGraph.disabled = true;
        btnGraph.style.opacity = '0.3';
        document.getElementById('graph-container').innerHTML =
          '<div class="graph-empty">포스트가 더 추가되면 그래프가 표시됩니다</div>';
      }

      // --- 그래프 초기화 ---
      function initMainGraph() {
        cy = initGraph(document.getElementById('graph-container'), graphData, {
          onNodeClick: function (slug) {
            window.location.href = '../posts/' + slug + '/';
          },
        });
      }

      // --- 검색 + 필터 적용 ---
      let debounceTimer;
      const searchInput = document.getElementById('search-input');
      const tfidfToggle = document.getElementById('tfidf-toggle');

      function applyFilters() {
        const query = searchInput.value;
        const mode = tfidfToggle.checked ? 'tfidf' : 'text';
        const activeTags = [...document.querySelectorAll('.tag--filter:not([data-all]).active')]
          .map(el => el.textContent);

        // 검색 결과
        let matchedIds = searchPosts(nodes, query, mode);
        // 태그 필터 교차
        if (activeTags.length > 0) {
          const tagMatched = new Set(filterByTags(nodes, activeTags));
          matchedIds = matchedIds.filter(id => tagMatched.has(id));
        }

        // 그래프 뷰 업데이트
        if (currentView === 'graph' && cy) {
          if (!query && activeTags.length === 0) {
            resetHighlight(cy);
          } else {
            highlightNodes(cy, matchedIds);
          }
        }

        // 리스트 뷰 업데이트
        if (currentView === 'list') {
          const matchedSet = new Set(matchedIds);
          const filtered = posts.filter(p => matchedSet.has(p.slug));
          renderPostList(filtered, document.getElementById('posts-container'), '../posts/');
        }
      }

      const tfidfLabel = document.getElementById('tfidf-label');
      searchInput.addEventListener('input', () => {
        const hasQuery = searchInput.value.trim();
        tfidfLabel.style.display = hasQuery ? '' : 'none';
        if (!hasQuery) tfidfToggle.checked = false;
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFilters, 300);
      });
      tfidfToggle.addEventListener('change', applyFilters);

      // --- 초기 렌더 ---
      setView(currentView);
      if (currentView === 'list') {
        renderPostList(posts, document.getElementById('posts-container'), '../posts/');
      }
    })();
  </script>
  <script src="../sidebar.js"></script>
  <script src="../page-fold.js"></script>
</body>
</html>
