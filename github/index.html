<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub — Ahrism</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body data-page="2">
  <aside id="sidebar">
    <div class="sidebar-icons">

      <button class="sidebar-btn" data-panel="about" data-label="About">◉</button>
      <button class="sidebar-btn" data-label="Blog" data-href="../blog/">≡</button>
      <button class="sidebar-btn active" data-label="GitHub" data-href="./">⬡</button>
    </div>
    <div id="panel-about" class="sidebar-panel">
      <div class="label">About</div>
      <p class="panel-placeholder">준비 중</p>
    </div>
  </aside>
  <div id="page-content">
  <main class="container">
    <div class="editorial-header">
      <span class="label--slash">GitHub</span>
      <h1>Repositories</h1>
    </div>
    <div id="github-sources"></div>
  </main>
  <footer class="container" style="margin-top: 3rem; padding-bottom: 2rem;">
    <div style="color: var(--pico-muted-color); font-size: 0.75rem; margin-bottom: 0.5rem;">
      Built with PicoCSS & Cytoscape.js
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; border-top: 1px solid var(--pico-muted-border-color); padding-top: 1.5rem;">

      <div style="flex: 1; min-width: 120px;">
        <small>&copy; 2026 ahrism</small>
      </div>

      <div style="flex: 1; text-align: center; min-width: 100px;">
        <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;" class="secondary" style="text-decoration: none; font-size: 0.85rem; font-weight: bold;">
          ↑ Top

      </div>

      <div style="flex: 1; display: flex; gap: 1.5rem; justify-content: flex-end; font-size: 0.85rem; min-width: 200px;">
        <a href="https://github.com/ahrism10M501" target="_blank" rel="noopener noreferrer" class="secondary">GitHub</a>
        <a href="https://www.youtube.com/@ahrism-3475" target="_blank" rel="noopener noreferrer" class="secondary">YouTube</a>
        <a href="mailto:l.all.means@gmail.com" class="secondary">Contact</a>
      </div>

    </div>
  </footer>
  </div><!-- /#page-content -->

  <script>
(function () {
  var CACHE_TTL = 5 * 60 * 1000;

  var LANG_COLORS = {
    Python: '#3572A5', JavaScript: '#f1e05a', TypeScript: '#3178c6',
    'C++': '#f34b7d', C: '#555555', Java: '#b07219', HTML: '#e34c26',
    CSS: '#563d7c', Rust: '#dea584', Go: '#00ADD8', Shell: '#89e051',
    'Jupyter Notebook': '#DA5B0B', Kotlin: '#A97BFF', Swift: '#F05138', Ruby: '#701516'
  };

  function relativeDate(dateStr) {
    var now = Date.now();
    var then = new Date(dateStr).getTime();
    var diff = now - then;
    var sec = Math.floor(diff / 1000);
    if (sec < 60) return '방금';
    var min = Math.floor(sec / 60);
    if (min < 60) return min + '분 전';
    var hr = Math.floor(min / 60);
    if (hr < 24) return hr + '시간 전';
    var day = Math.floor(hr / 24);
    if (day < 30) return day + '일 전';
    var month = Math.floor(day / 30);
    if (month < 12) return month + '개월 전';
    return Math.floor(month / 12) + '년 전';
  }

  function getCached(key) {
    try {
      var raw = sessionStorage.getItem(key);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (Date.now() - obj.ts > CACHE_TTL) {
        sessionStorage.removeItem(key);
        return null;
      }
      return obj.data;
    } catch (e) { return null; }
  }

  function setCache(key, data) {
    try {
      sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data: data }));
    } catch (e) {}
  }

  function fetchRepos(source) {
    var cacheKey = 'gh_repos_' + source.name;
    var cached = getCached(cacheKey);
    if (cached) return Promise.resolve(cached);

    var base = source.type === 'org'
      ? 'https://api.github.com/orgs/'
      : 'https://api.github.com/users/';
    var url = base + encodeURIComponent(source.name) + '/repos?sort=updated&per_page=100';

    return fetch(url)
      .then(function (r) {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      })
      .then(function (repos) {
        setCache(cacheKey, repos);
        return repos;
      });
  }

  function renderRepoCard(repo) {
    var card = document.createElement('a');
    card.className = 'gh-repo-card';
    card.href = repo.html_url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';

    var name = document.createElement('div');
    name.className = 'gh-repo-name';
    name.textContent = repo.name;
    card.appendChild(name);

    if (repo.description) {
      var desc = document.createElement('div');
      desc.className = 'gh-repo-desc';
      desc.textContent = repo.description;
      card.appendChild(desc);
    }

    var meta = document.createElement('div');
    meta.className = 'gh-repo-meta';

    if (repo.language) {
      var lang = document.createElement('span');
      lang.className = 'gh-repo-lang';
      var dot = document.createElement('span');
      dot.className = 'gh-lang-dot';
      dot.style.background = LANG_COLORS[repo.language] || '#888';
      lang.appendChild(dot);
      lang.appendChild(document.createTextNode(repo.language));
      meta.appendChild(lang);
    }

    if (repo.stargazers_count > 0) {
      var stars = document.createElement('span');
      stars.className = 'gh-repo-stars';
      stars.textContent = '\u2605 ' + repo.stargazers_count;
      meta.appendChild(stars);
    }

    if (repo.updated_at) {
      var date = document.createElement('span');
      date.className = 'gh-repo-date';
      date.textContent = relativeDate(repo.updated_at);
      meta.appendChild(date);
    }

    card.appendChild(meta);
    return card;
  }

  function renderSection(source, container) {
    var section = document.createElement('div');
    section.className = 'gh-source-section';

    var label = document.createElement('div');
    label.className = 'label';
    label.textContent = source.label || source.name;
    section.appendChild(label);

    container.appendChild(section);

    fetchRepos(source)
      .then(function (repos) {
        repos = repos.filter(function (r) { return !r.fork; });
        if (repos.length === 0) {
          var empty = document.createElement('p');
          empty.className = 'gh-empty';
          empty.textContent = '공개 리포지토리가 없습니다';
          section.appendChild(empty);
          return;
        }
        var scroll = document.createElement('div');
        scroll.className = 'gh-repo-scroll';
        scroll.style.setProperty('--gh-rows', source.rows || 1);
        repos.forEach(function (repo) {
          scroll.appendChild(renderRepoCard(repo));
        });
        section.appendChild(scroll);
      })
      .catch(function (err) {
        var errEl = document.createElement('p');
        errEl.className = 'gh-error';
        errEl.textContent = 'API 요청 실패 — 잠시 후 다시 시도해주세요 (' + err.message + ')';
        section.appendChild(errEl);
      });
  }

  // Init
  fetch('../github-sources.json')
    .then(function (r) {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    })
    .then(function (sources) {
      var container = document.getElementById('github-sources');
      sources.forEach(function (source) {
        renderSection(source, container);
      });
    })
    .catch(function (err) {
      document.getElementById('github-sources').innerHTML =
        '<p class="gh-error">소스 설정을 불러올 수 없습니다 (' + err.message + ')</p>';
    });
})();
  </script>
  <script src="../app.js"></script>
  <script src="../sidebar.js"></script>
  <script src="../page-fold.js"></script>
</body>
</html>
