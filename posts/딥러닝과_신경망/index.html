<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... — ahrism</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/styles/github-dark.min.css">
</head>
<body>
  <header class="container">
    <nav>
      <ul><li><strong><a href="../../">ahrism</a></strong></li></ul>
      <ul>
        <li><a href="../../#about">About</a></li>
        <li><a href="../../blog/" class="active">Blog</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    <a href="../../blog/" style="font-size:0.85rem;color:#444">← Blog</a>
    <div id="post-header" class="editorial-header">
      <div class="post-meta" id="post-meta"></div>
      <h1 id="post-title"></h1>
    </div>
    <article id="post-content" class="post-content"></article>
    <!-- Related posts subgraph -->
    <section id="related-graph-section" style="display:none">
      <div class="section-label">Related Posts</div>
      <div class="depth-control">
        <label for="depth-slider">깊이:</label>
        <input type="range" id="depth-slider" min="2" max="5" value="2">
        <span class="depth-value" id="depth-value">2</span>
      </div>
      <div class="graph-container subgraph" id="subgraph-container"></div>
    </section>
  </main>
  <footer class="container">
    <small>&copy; 2024 ahrism</small>
  </footer>

  <script src="../../app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
  <script src="../../graph.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js"></script>
  <script src="../../post.js"></script>
</body>
</html>
