<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twinkle — Ahrism</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="../style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<button id="sidebar-toggle" aria-label="메뉴">☰</button>
<aside id="sidebar">
  <div class="sidebar-icons">
    <button class="sidebar-btn" data-label="Home" data-href="../">⌂</button>
    <button class="sidebar-btn" data-label="About" data-href="../about/">◉</button>
    <button class="sidebar-btn" data-label="Blog" data-href="../blog/">≡</button>
    <button class="sidebar-btn active" data-label="Twinkle" data-href="../twinkle/">✦</button>
    <button class="sidebar-btn" data-label="GitHub" data-href="../github/">⬡</button>
  </div>
</aside>
  <div id="page-content">
<main class="container">
  <div class="twinkle-layout">
    <div class="twinkle-feed-col">
      <div id="mobile-tags" class="twinkle-mobile-tags"></div>
      <div class="twinkle-feed" id="twinkle-feed">
        <div class="label">✦ TWINKLE</div>
        <p style="color:#555;font-size:0.85rem">로딩 중...</p>
      </div>
    </div>
    <div class="twinkle-archive" id="twinkle-archive">
      <div class="twinkle-archive-resize" id="archive-resize-handle">⠿</div>
      <div class="twinkle-archive-inner">
        <div class="label">ARCHIVE</div>
        <div class="archive-tag-chips" id="archive-tags"></div>
        <div class="archive-list" id="archive-list"></div>
      </div>
    </div>
  </div>
</main>
<footer class="container site-footer">
  <div class="site-footer-credit">Built with PicoCSS &amp; Cytoscape.js</div>
  <div class="site-footer-row">
    <div class="site-footer-col"><small>&copy; 2026 ahrism</small></div>
    <div class="site-footer-col site-footer-top">
      <a href="#" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;" class="secondary">↑ Top</a>
    </div>
    <div class="site-footer-col site-footer-links">
      <a href="https://github.com/ahrism10M501" target="_blank" rel="noopener noreferrer" class="secondary">GitHub</a>
      <a href="https://www.youtube.com/@ahrism-3475" target="_blank" rel="noopener noreferrer" class="secondary">YouTube</a>
      <a href="mailto:l.all.means@gmail.com" class="secondary">Contact</a>
    </div>
  </div>
</footer>
  </div>
<script src="../src/twinkle-feed.js"></script>
<script>
initTwinkleFeed({
  twinklesUrl: '../twinkle/twinkles.json',
  sessionKey: 'twinkle-expanded',
  ids: {
    feed: 'twinkle-feed',
    archive: 'twinkle-archive',
    archiveTags: 'archive-tags',
    archiveList: 'archive-list',
    mobileTags: 'mobile-tags',
    resizeHandle: 'archive-resize-handle',
    prev: 'nav-prev',
    next: 'nav-next',
    cardPrefix: 'card-',
  },
  useHash: true,
  prependLabel: true,
});
</script>
  <script src="../src/sidebar.js"></script>
  <script src="../src/page-fold.js"></script>
</body>
</html>
